<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Credentials Control Panel</title>

<style>
body {
    margin: 0;
    font-family: monospace;
    background: #0a0f1c;
    color: #e5e7eb;
}

header {
    padding: 14px 18px;
    background: #111827;
    border-bottom: 1px solid #1f2937;
}

h1 {
    margin: 0;
    font-size: 16px;
    color: #60a5fa;
}

.layout {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 14px;
    padding: 14px;
}

.card {
    background: #0f172a;
    border: 1px solid #1f2937;
    border-radius: 10px;
    padding: 12px;
    display: flex;
    flex-direction: column;
    gap: 8px;
}

.card h2 {
    margin: 0;
    font-size: 13px;
    color: #38bdf8;
}

input, button {
    padding: 7px;
    border-radius: 6px;
    border: none;
    font-family: monospace;
}

input {
    background: #020617;
    color: #e5e7eb;
    border: 1px solid #1f2937;
}

button {
    background: #38bdf8;
    cursor: pointer;
}

button.danger {
    background: #ef4444;
    color: white;
}

.list {
    background: #020617;
    border: 1px solid #1f2937;
    border-radius: 8px;
    padding: 8px;
    min-height: 80px;
    max-height: 180px;
    overflow-y: auto;
}

.row {
    display: flex;
    justify-content: space-between;
    padding: 4px 6px;
    border-bottom: 1px solid #111827;
}

.tag {
    font-size: 10px;
    padding: 2px 6px;
    border-radius: 5px;
}

.tag.session {
    background: #7c3aed;
}

.tag.identity {
    background: #10b981;
    color: black;
}

.small {
    color: #94a3b8;
    font-size: 11px;
}
</style>
</head>

<body>

<header>
    <h1>🔐 Credentials Control Panel <span class="small">auth artifact layer</span></h1>
</header>

<div class="layout">

<!-- IDENTITY RESOLUTION -->
<div class="card">
    <h2>🧠 Identity Resolver</h2>

    <button onclick="resolveIdentity()">Resolve Current Credential</button>

    <div class="list" id="identityBox"></div>
</div>

<!-- SESSIONS -->
<div class="card">
    <h2>🔑 Active Credentials (Sessions)</h2>

    <button onclick="loadSessions()">Refresh Session Pool</button>

    <div class="list" id="sessionBox"></div>

    <input id="revokeToken" placeholder="session token">
    <button class="danger" onclick="revokeSession()">Revoke Credential</button>
</div>

<!-- USER KEYSPACE -->
<div class="card">
    <h2>🧾 Credential Keyspace (Usernames)</h2>

    <button onclick="loadKeys()">Sync Keyspace</button>

    <div class="list" id="userBox"></div>
</div>

<!-- MUTATION -->
<div class="card">
    <h2>🛠 Credential Mutation Engine</h2>

    <input id="u" placeholder="credential key (username)">
    <input id="p" placeholder="new secret">

    <button onclick="resetSecret()">Rotate Secret</button>

    <div class="small" id="mutateStatus"></div>
</div>

</div>

<script>

/* ---------------- UI HELPERS ---------------- */

function addRow(box, left, right, cls) {
    const div = document.createElement("div");
    div.className = "row";

    const l = document.createElement("div");
    l.textContent = left;

    const r = document.createElement("div");
    r.textContent = right || "";
    r.className = cls || "";

    div.appendChild(l);
    div.appendChild(r);

    document.getElementById(box).appendChild(div);
}

function clear(box) {
    document.getElementById(box).innerHTML = "";
}

/* ---------------- IDENTITY ---------------- */

async function resolveIdentity() {
    const res = await fetch("/auth/me", { credentials: "include" });
    const data = await res.json();

    clear("identityBox");

    if (data.authenticated) {
        addRow("identityBox", "resolved", data.username, "tag identity");
    } else {
        addRow("identityBox", "resolved", "unauthenticated");
    }
}

/* ---------------- SESSIONS ---------------- */

async function loadSessions() {
    const res = await fetch("/auth/sessions", { credentials: "include" });
    const data = await res.json();

    clear("sessionBox");

    (data.sessions || []).forEach(s => {
        addRow("sessionBox", s, "active", "tag session");
    });
}

async function revokeSession() {
    const token = document.getElementById("revokeToken").value;

    if (!token) return;

    await fetch("/auth/sessions/" + token, {
        method: "DELETE",
        credentials: "include"
    });

    document.getElementById("revokeToken").value = "";
    loadSessions();
}

/* ---------------- KEYSPACE ---------------- */

async function loadKeys() {
    const res = await fetch("/auth/users", { credentials: "include" });
    const data = await res.json();

    clear("userBox");

    (data.users || []).forEach(u => {
        addRow("userBox", u, "credential key");
    });
}

/* ---------------- MUTATION ---------------- */

async function resetSecret() {
    const username = document.getElementById("u").value;
    const newpass = document.getElementById("p").value;

    if (!username || !newpass) return;

    const res = await fetch("/auth/change_password", {
        method: "POST",
        headers: {"Content-Type": "application/json"},
        body: JSON.stringify({
            username,
            new_password: newpass
        })
    });

    const ok = res.ok;

    document.getElementById("mutateStatus").textContent =
        ok ? "✔ credential rotated" : "✖ mutation failed";

    document.getElementById("u").value = "";
    document.getElementById("p").value = "";
}

</script>


<link rel="stylesheet" href="/thimpos.css">
<script src="/thimpos.js" defer></script>
</body>
</html>
